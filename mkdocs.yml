site_name: Python pro seminář
site_description: Online učebnice programování v Pythonu pro střední školu
site_author: Jaroslav Fait
site_url: https://faitjaroslav-byte.github.io/python_seminar/

repo_name: python_seminar
repo_url: https://github.com/faitjaroslav-byte/python_seminar
edit_uri: edit/main/docs/

theme:
  name: material
  language: cs
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Přepnout na tmavý režim
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Přepnout na světlý režim

nav:
  - Úvod:
      - O učebnici: index.md
      - Jak pracovat s kurzem: 00-jak-pracovat/index.md
  - Základy Pythonu:
      - 1. Vývojové prostředí: 01-vyvojove-prostredi/index.md
      - 2. První program: 02-prvni-program/index.md
      - 3. Proměnné: 03-promenne-a-vstup/index.md
      - 4. Rozhodování: 04-rozhodovani/index.md
      - 5. Cykly: 05-cykly/index.md
      - 6. Projekt Zvířecí kvíz: 06-zvireci-kviz/index.md
      - 7. Funkce: 07-funkce/index.md
      - 8. Hledání a oprava chyb: 08-oprava-chyb/index.md
      - 9. Projekt Generátor hesel: 09-generator-hesel/index.md
      - 10. Moduly: 10-moduly/index.md
      - 11. Projekt Devět životů: 11-devet-zivotu/index.md
  - Turtle Graphics:
      - 12. Úvod do Turtle: 12-turtle-uvod/index.md
      - 13. Projekt Stavitel robota: 13-stavitel-robota/index.md
      - 14. Projekt Kaleido-spirála: 14-kaleido-spirala/index.md
      - 15. Projekt Hvězdná noc: 15-hvezdna-noc/index.md
      - 16. Projekt Mutantní duha: 16-mutantni-duha/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

copyright: Materiál pro výuku Pythonu
