<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 1180" role="img" aria-labelledby="title desc">
  <title id="title">Projekt Animal Quiz - kompletní flowchart</title>
  <desc id="desc">Flowchart projektu podle předlohy: nastavit skóre, zobrazit úvod, položit otázku, zkontrolovat odpověď, řešit správnou odpověď, zbývající pokusy, další otázky, výpis skóre a konec.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#208fb5" />
    </marker>
    <style>
      .box { fill: #e8f7fb; stroke: #208fb5; stroke-width: 3; rx: 16; }
      .terminator { fill: #d9f4fb; stroke: #208fb5; stroke-width: 3; rx: 28; }
      .decision { fill: #f45092; stroke: #b71f5a; stroke-width: 3; }
      .text { font-family: Arial, sans-serif; font-size: 21px; fill: #103044; text-anchor: middle; dominant-baseline: middle; }
      .decision-text { font-family: Arial, sans-serif; font-size: 21px; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 18px; }
      .label { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #103044; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #208fb5; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .plain-line { stroke: #208fb5; stroke-width: 4; fill: none; }
    </style>
  </defs>

  <rect class="terminator" x="330" y="30" width="300" height="64" />
  <text class="text" x="480" y="62">Start</text>

  <path class="line" d="M480,96 L480,135" />
  <rect class="box" x="330" y="140" width="300" height="72" />
  <text class="text" x="480" y="176">Nastav skóre na 0</text>

  <path class="line" d="M480,214 L480,253" />
  <rect class="box" x="300" y="258" width="360" height="82" />
  <text class="text" x="480" y="289">Zobraz hlášku</text>
  <text class="text small" x="480" y="315">"Guess the Animal!"</text>

  <path class="line" d="M480,342 L480,381" />
  <rect class="box" x="270" y="386" width="420" height="92" />
  <text class="text" x="480" y="418">Polož otázku</text>
  <text class="text small" x="480" y="446">a načti odpověď hráče</text>

  <path class="line" d="M480,480 L480,519" />
  <rect class="box" x="315" y="524" width="330" height="72" />
  <text class="text" x="480" y="560">Zkontroluj odpověď</text>

  <path class="line" d="M480,598 L480,637" />
  <polygon class="decision" points="480,640 650,705 480,770 310,705" />
  <text class="decision-text" x="480" y="694">Je odpověď</text>
  <text class="decision-text" x="480" y="720">správná?</text>

  <text class="label" x="448" y="794">ANO</text>
  <path class="line" d="M480,772 L480,820" />
  <rect class="box" x="330" y="825" width="300" height="72" />
  <text class="text" x="480" y="861">Přičti 1 bod</text>

  <text class="label" x="670" y="684">NE</text>
  <path class="line" d="M650,705 L704,705" />
  <polygon class="decision" points="840,640 980,705 840,770 700,705" />
  <text class="decision-text small" x="840" y="694">Zbývá ještě</text>
  <text class="decision-text small" x="840" y="720">pokus?</text>

  <text class="label" x="840" y="616">ANO</text>
  <path class="plain-line" d="M840,638 L840,432" />
  <path class="line" d="M840,432 L692,432" />

  <text class="label" x="840" y="794">NE</text>
  <path class="plain-line" d="M840,772 L840,955" />
  <path class="line" d="M840,955 L650,955" />

  <path class="line" d="M480,899 L480,917" />
  <polygon class="decision" points="480,920 650,985 480,1050 310,985" />
  <text class="decision-text" x="480" y="974">Jsou další</text>
  <text class="decision-text" x="480" y="1000">otázky?</text>

  <text class="label" x="260" y="964">ANO</text>
  <path class="plain-line" d="M310,985 L170,985" />
  <path class="plain-line" d="M170,985 L170,432" />
  <path class="line" d="M170,432 L268,432" />

  <text class="label" x="510" y="1074">NE</text>
  <path class="line" d="M480,1052 L480,1090" />
  <rect class="box" x="330" y="1095" width="300" height="64" />
  <text class="text" x="480" y="1127">Vypiš skóre</text>

  <rect class="terminator" x="680" y="1095" width="210" height="64" />
  <text class="text" x="785" y="1127">Konec</text>
  <path class="line" d="M630,1127 L678,1127" />
</svg>
